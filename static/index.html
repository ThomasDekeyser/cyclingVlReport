<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycling VL Report</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/nl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    [data-toggle] { cursor: pointer; }
  </style>
</head>
<body class="bg-light py-4">

<div id="app" class="container">

  <!-- Filter card -->
  <div class="card shadow-sm mb-4">
    <div class="card-header">
      <h5 class="mb-0">Cycling VL Report</h5>
    </div>
    <div class="card-body">

      <div class="row g-3 align-items-end">

        <!-- Periode -->
        <div class="col-12 col-md-5">
          <label class="form-label fw-semibold text-secondary small text-uppercase">Periode</label>
          <div class="row g-2">
            <div class="col-6">
              <label for="from-select" class="form-label small mb-1 text-muted">Van</label>
              <div class="input-group input-group-sm" ref="fromWrap">
                <input id="from-select" type="text" class="form-control form-control-sm" placeholder="dd/mm/jjjj" data-input />
                <span class="input-group-text" data-toggle><i class="bi bi-calendar"></i></span>
              </div>
            </div>
            <div class="col-6">
              <label for="to-select" class="form-label small mb-1 text-muted">Tot</label>
              <div class="input-group input-group-sm" ref="toWrap">
                <input id="to-select" type="text" class="form-control form-control-sm" placeholder="dd/mm/jjjj" data-input />
                <span class="input-group-text" data-toggle><i class="bi bi-calendar"></i></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Club -->
        <div class="col-12 col-md-5">
          <label for="team-select" class="form-label fw-semibold text-secondary small text-uppercase">Team</label>
          <select id="team-select" class="form-select form-select-sm" v-model="teamName">
            <option value="">— Selecteer een team —</option>
            <option value="K.V.C. DEINZE VZW">K.V.C. DEINZE VZW</option>
            <option value="ISOREX CYCLING TEAM">ISOREX CYCLING TEAM</option>
          </select>
        </div>

        <!-- Search / Export buttons -->
        <div class="col-12 col-md-2 d-grid gap-2">
          <button class="btn btn-primary btn-sm"
                  :disabled="!isValid || loading"
                  @click="search">
            <span v-if="loading" class="spinner-border spinner-border-sm me-1" role="status"></span>
            <i v-else class="bi bi-search me-1"></i>
            Zoeken
          </button>
          <button class="btn btn-success btn-sm"
                  v-if="hasExportableResults"
                  @click="exportExcel">
            <i class="bi bi-file-earmark-excel me-1"></i>
            Exporteren
          </button>
        </div>

      </div>

      <div v-if="error" class="alert alert-danger mt-3 mb-0 py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
      </div>

    </div>
  </div>

  <!-- Results -->
  <template v-if="races !== null">

    <div v-if="races.length === 0" class="text-muted fst-italic small">
      Geen races gevonden met een uitslag voor de geselecteerde periode.
    </div>

    <div v-for="race in sortedRaces" :key="race.id" class="card shadow-sm mb-3">
      <!-- Race header -->
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>
          <span class="fw-semibold">{{ race.city }}</span>
          <span class="text-muted small ms-2">{{ race.date }}</span>
          <span class="text-muted small ms-2">— {{ race.description }}</span>
        </span>
        <span class="badge bg-secondary">ID {{ race.id }}</span>
      </div>

      <!-- Loading race results -->
      <div v-if="race.loading" class="card-body py-2 text-muted small">
        <span class="spinner-border spinner-border-sm me-1"></span> Uitslagen laden…
      </div>

      <!-- No club results -->
      <div v-else-if="race.lines && race.lines.length === 0" class="card-body py-2 text-muted fst-italic small">
        Geen renners van {{ teamName }} in deze uitslag.
      </div>

      <!-- Rider results table -->
      <div v-else-if="race.lines && race.lines.length > 0" class="table-responsive">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Plaats</th>
              <th>Naam</th>
              <th>UCI code</th>
              <th>Team</th>
              <th>Club</th>
              <th>Tijd</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="line in race.lines">
              <td class="fw-semibold">{{ line.place }}</td>
              <td>{{ line.person.first_name }} {{ line.person.last_name }}</td>
              <td class="text-muted small">{{ line.person.uci_code }}</td>
              <td>{{ line.team }}</td>
              <td>{{ line.club?.club_name ?? '' }}</td>
              <td class="text-nowrap">{{ formatTime(line.chrono_in_seconds) }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </template>

</div>

<script>
const { createApp, reactive } = Vue;

const CYCLING_API = 'https://cycling.vlaanderen/actions/cycling-api-module/api';
const CORS_PROXY  = 'https://corsproxy.io/?url=';

function proxyFetch(params) {
  const targetUrl = `${CYCLING_API}?${new URLSearchParams(params)}`;
  return fetch(`${CORS_PROXY}${encodeURIComponent(targetUrl)}`).then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  });
}

createApp({
  data() {
    const today = new Date();
    const threeDaysAgo = new Date();
    threeDaysAgo.setDate(today.getDate() - 10);
    return {
      from:     threeDaysAgo,
      to:       today,
      teamName: '',
      races:    null,
      loading:  false,
      error:    null,
    };
  },

  computed: {
    isValid() {
      return this.from && this.to && this.teamName;
    },
    sortedRaces() {
      if (!this.races) return [];
      return [...this.races].sort((a, b) => {
        const aHas = a.lines?.length > 0 ? 0 : 1;
        const bHas = b.lines?.length > 0 ? 0 : 1;
        return aHas - bHas || b.date.localeCompare(a.date);
      });
    },
    hasExportableResults() {
      return this.races?.some(r => r.lines?.length > 0) ?? false;
    },
  },

  mounted() {
    const shared = {
      wrap: true,
      locale: 'nl',
      dateFormat: 'd/m/Y',
      disableMobile: true,
    };

    this.fpFrom = flatpickr(this.$refs.fromWrap, {
      ...shared,
      defaultDate: this.from,
      onChange: ([date]) => { this.from = date || null; },
    });

    this.fpTo = flatpickr(this.$refs.toWrap, {
      ...shared,
      defaultDate: this.to,
      onChange: ([date]) => { this.to = date || null; },
    });
  },

  beforeUnmount() {
    this.fpFrom?.destroy();
    this.fpTo?.destroy();
  },

  methods: {
    isoDate(d) {
      if (!d) return null;
      const y   = d.getFullYear().toString().padStart(4, '0');
      const m   = (d.getMonth() + 1).toString().padStart(2, '0');
      const day = d.getDate().toString().padStart(2, '0');
      return `${y}-${m}-${day}`;
    },

    formatTime(seconds) {
      if (!seconds) return '—';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    },

    async search() {
      this.error   = null;
      this.races   = null;
      this.loading = true;

      try {
        const json = await proxyFetch({
          method:     'races.json',
          from_date:  this.isoDate(this.from),
          to_date:    this.isoDate(this.to),
          provinces:  '',
          categories: '',
        });

        const allRaces = (json?.data?.races ?? [])
          .filter(r => r.result === 1)
          .sort((a, b) => b.date.localeCompare(a.date));

        // Build reactive race objects with a loading flag
        this.races = allRaces.map(r => reactive({ ...r, lines: null, loading: true }));

        // Fetch all race results in parallel
        await Promise.all(this.races.map(race => this.fetchRaceResults(race)));

      } catch (e) {
        this.error = `Kon de gegevens niet ophalen: ${e.message}`;
      } finally {
        this.loading = false;
      }
    },

    exportExcel() {
      const rows = [];
      for (const race of this.sortedRaces) {
        if (!race.lines?.length) continue;
        for (const line of race.lines) {
          rows.push({
            Datum:       race.date,
            Stad:        race.city,
            Wedstrijd:   race.description,
            Plaats:      line.place,
            Voornaam:    line.person.first_name,
            Achternaam:  line.person.last_name,
            'UCI code':  line.person.uci_code,
            Team:        line.team,
            Club:        line.club?.club_name ?? '',
            Tijd:        this.formatTime(line.chrono_in_seconds),
          });
        }
      }

      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Uitslagen');
      XLSX.writeFile(wb, `cyclingVlReport-${this.isoDate(this.from)}_${this.isoDate(this.to)}_${this.teamName.replaceAll(' ','_')}.xlsx`);
    },

    async fetchRaceResults(race) {
      try {
        const json = await proxyFetch({ method: 'race_results.json', race_id: race.id });
        const allLines = (json?.data?.race_results ?? [])
          .flatMap(rr => rr.race_result_lines ?? []);
        race.lines = allLines.filter(l => l.team === this.teamName);
      } catch {
        race.lines = [];
      } finally {
        race.loading = false;
      }
    },
  },
}).mount('#app');
</script>
</body>
</html>
