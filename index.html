<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Range Selector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center py-4">

  <div id="app" class="w-100" style="max-width: 480px;">
    <div class="card shadow-sm">
      <div class="card-header">
        <h5 class="mb-0">Date Range Selector</h5>
      </div>
      <div class="card-body">

        <!-- From -->
        <div class="mb-3">
          <label class="form-label fw-semibold text-secondary small text-uppercase">From</label>
          <div class="row g-2">
            <div class="col-5">
              <select class="form-select form-select-sm" v-model="from.year">
                <option value="">Year</option>
                <option v-for="y in years" :key="y" :value="y">{{ y }}</option>
              </select>
            </div>
            <div class="col-4">
              <select class="form-select form-select-sm" v-model="from.month">
                <option value="">Month</option>
                <option v-for="m in months" :key="m.value" :value="m.value">{{ m.label }}</option>
              </select>
            </div>
            <div class="col-3">
              <select class="form-select form-select-sm" v-model="from.day">
                <option value="">Day</option>
                <option v-for="d in daysFor(from.year, from.month)" :key="d" :value="d">
                  {{ String(d).padStart(2, '0') }}
                </option>
              </select>
            </div>
          </div>
        </div>

        <!-- To -->
        <div class="mb-3">
          <label class="form-label fw-semibold text-secondary small text-uppercase">To</label>
          <div class="row g-2">
            <div class="col-5">
              <select class="form-select form-select-sm" :class="{ 'is-invalid': rangeError }" v-model="to.year">
                <option value="">Year</option>
                <option v-for="y in years" :key="y" :value="y">{{ y }}</option>
              </select>
            </div>
            <div class="col-4">
              <select class="form-select form-select-sm" :class="{ 'is-invalid': rangeError }" v-model="to.month">
                <option value="">Month</option>
                <option v-for="m in months" :key="m.value" :value="m.value">{{ m.label }}</option>
              </select>
            </div>
            <div class="col-3">
              <select class="form-select form-select-sm" :class="{ 'is-invalid': rangeError }" v-model="to.day">
                <option value="">Day</option>
                <option v-for="d in daysFor(to.year, to.month)" :key="d" :value="d">
                  {{ String(d).padStart(2, '0') }}
                </option>
              </select>
            </div>
          </div>
          <div class="invalid-feedback d-block" v-if="rangeError">{{ rangeError }}</div>
        </div>

        <hr />

        <!-- Result -->
        <label class="form-label fw-semibold text-secondary small text-uppercase">Result</label>
        <pre v-if="isValid" class="bg-white border rounded p-3 mb-0 small">{{ output }}</pre>
        <p v-else class="text-muted fst-italic small mb-0">Select both dates to see the result…</p>

      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        const currentYear = new Date().getFullYear();
        const years = [];
        for (let y = currentYear + 5; y >= 1900; y--) years.push(y);

        const months = [
          { value: '01', label: 'Jan' }, { value: '02', label: 'Feb' },
          { value: '03', label: 'Mar' }, { value: '04', label: 'Apr' },
          { value: '05', label: 'May' }, { value: '06', label: 'Jun' },
          { value: '07', label: 'Jul' }, { value: '08', label: 'Aug' },
          { value: '09', label: 'Sep' }, { value: '10', label: 'Oct' },
          { value: '11', label: 'Nov' }, { value: '12', label: 'Dec' },
        ];

        return {
          years,
          months,
          from: { year: '', month: '', day: '' },
          to:   { year: '', month: '', day: '' },
        };
      },

      computed: {
        fromDate() {
          const { year, month, day } = this.from;
          if (!year || !month || !day) return null;
          return `${year}-${month}-${String(day).padStart(2, '0')}`;
        },

        toDate() {
          const { year, month, day } = this.to;
          if (!year || !month || !day) return null;
          return `${year}-${month}-${String(day).padStart(2, '0')}`;
        },

        rangeError() {
          if (this.fromDate && this.toDate && this.fromDate > this.toDate) {
            return '"From" date must not be after "To" date.';
          }
          return null;
        },

        isValid() {
          return this.fromDate && this.toDate && !this.rangeError;
        },

        output() {
          return JSON.stringify({ from: this.fromDate, to: this.toDate }, null, 2);
        },
      },

      methods: {
        daysFor(year, month) {
          if (!month) return Array.from({ length: 31 }, (_, i) => i + 1);
          const count = year ? new Date(Number(year), Number(month), 0).getDate() : 31;
          return Array.from({ length: count }, (_, i) => i + 1);
        },
      },

      watch: {
        'from.month'() { this.from.day = ''; },
        'from.year'()  { this.from.day = ''; },
        'to.month'()   { this.to.day = ''; },
        'to.year'()    { this.to.day = ''; },
      },
    }).mount('#app');
  </script>
</body>
</html>
