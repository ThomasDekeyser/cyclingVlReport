<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Range Selector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/nl.js"></script>
  <style>
    .flatpickr-day.selected,
    .flatpickr-day.selected:hover  { background: #0d6efd; border-color: #0d6efd; }
    .flatpickr-day.inRange         {
      background: #cfe2ff; border-color: #cfe2ff;
      box-shadow: -5px 0 0 #cfe2ff, 5px 0 0 #cfe2ff;
    }
    .flatpickr-day.startRange,
    .flatpickr-day.endRange        { background: #0d6efd; border-color: #0d6efd; }
    [data-toggle] { cursor: pointer; }
  </style>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center py-4">

<div id="app" class="w-100" style="max-width: 480px;">
  <div class="card shadow-sm">
    <div class="card-header">
      <h5 class="mb-0">Date Range Selector</h5>
    </div>
    <div class="card-body">

      <label class="form-label fw-semibold text-secondary small text-uppercase">Periode</label>

      <div class="row g-2 mb-1">
        <!-- Van — wrap mode: data-input is the text field, data-toggle opens the picker -->
        <div class="col-6">
          <label class="form-label small mb-1 text-muted">Van</label>
          <div class="input-group input-group-sm" ref="fromWrap">
            <input type="text" class="form-control form-control-sm"
                   placeholder="dd/mm/jjjj" data-input />
            <span class="input-group-text" data-toggle>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>
            </span>
          </div>
        </div>
        <!-- Tot -->
        <div class="col-6">
          <label class="form-label small mb-1 text-muted">Tot</label>
          <div class="input-group input-group-sm" ref="toWrap">
            <input type="text" class="form-control form-control-sm"
                   placeholder="dd/mm/jjjj" data-input />
            <span class="input-group-text" data-toggle>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>
            </span>
          </div>
        </div>
      </div>

      <div class="form-text mb-3"
           :class="rangeError ? 'text-danger' : 'text-muted'">
        {{ rangeError || 'Max. 1 jaar' }}
      </div>

      <hr />

      <label class="form-label fw-semibold text-secondary small text-uppercase">Result</label>
      <pre v-if="isValid" class="bg-white border rounded p-3 mb-0 small">{{ output }}</pre>
      <p v-else class="text-muted fst-italic small mb-0">Selecteer een begin- en einddatum…</p>

    </div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      from: null,
      to:   null,
    };
  },

  computed: {
    rangeError() {
      if (!this.from || !this.to) return null;
      const diff = this.to - this.from;
      if (diff < 0) return '"Tot" moet na "Van" liggen.';
      if (diff > 365 * 864e5) return 'De periode mag niet groter zijn dan 1 jaar.';
      return null;
    },
    isValid() {
      return this.from && this.to && !this.rangeError;
    },
    output() {
      return JSON.stringify({ from: this.isoDate(this.from), to: this.isoDate(this.to) }, null, 2);
    },
  },

  mounted() {
    const shared = {
      wrap: true,
      locale: 'nl',
      dateFormat: 'd/m/Y',
      disableMobile: true,
    };

    this.fpFrom = flatpickr(this.$refs.fromWrap, {
      ...shared,
      onChange: ([date]) => { this.from = date || null; },
    });

    this.fpTo = flatpickr(this.$refs.toWrap, {
      ...shared,
      onChange: ([date]) => { this.to = date || null; },
    });
  },

  beforeUnmount() {
    this.fpFrom?.destroy();
    this.fpTo?.destroy();
  },

  methods: {
    isoDate(d) {
      if (!d) return null;
      const y = d.getFullYear().toString().padStart(4, '0');
      const m = (d.getMonth() + 1).toString().padStart(2, '0');
      const day = d.getDate().toString().padStart(2, '0');
      return `${y}-${m}-${day}`;
    },
  },
}).mount('#app');
</script>
</body>
</html>
